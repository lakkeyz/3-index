<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #ff6b6b;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    transition: background 0.6s ease;
    text-align: center;
  }

  .timer {
    background: rgba(0,0,0,0.15);
    padding: 60px 50px;
    border-radius: 24px;
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }

  h1 {
    font-size: 7rem;
    margin-bottom: 40px;
    font-weight: 700;
    letter-spacing: -2px;
  }

  .buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
  }

  button {
    background: #fff;
    color: #ff6b6b;
    border: none;
    padding: 16px 35px;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }

  button:active { transform: translateY(0); }
  
  .status {
    margin-top: 20px;
    font-size: 1.2rem;
    opacity: 0.9;
  }
</style>
</head>
<body>

<div class="timer">
  <h1 id="display">25:00</h1>
  <div class="buttons">
    <button id="btnIniciar">Iniciar</button>
    <button id="btnReset">Resetar</button>
  </div>
  <div class="status" id="status">Foco total</div>
</div>

<script>
let tempo = 25 * 60;
let rodando = false;
let intervalo;

const display = document.getElementById('display');
const btnIniciar = document.getElementById('btnIniciar');
const status = document.getElementById('status');

function atualizarDisplay() {
  const min = Math.floor(tempo / 60);
  const seg = tempo % 60;
  display.textContent = `${String(min).padStart(2, '0')}:${String(seg).padStart(2, '0')}`;
}

btnIniciar.addEventListener('click', () => {
  if (!rodando) {
    rodando = true;
    btnIniciar.textContent = 'Pausar';
    status.textContent = 'Em foco...';
    
    intervalo = setInterval(() => {
      tempo--;
      atualizarDisplay();
      
      if (tempo <= 0) {
        clearInterval(intervalo);
        rodando = false;
        document.body.style.background = '#51cf66';
        status.textContent = 'Hora de descansar!';
        alert('Tempo acabou! Hora de descansar 5 min.');
        btnIniciar.textContent = 'Iniciar';
      }
    }, 1000);
  } else {
    rodando = false;
    btnIniciar.textContent = 'Continuar';
    status.textContent = 'Pausado';
    clearInterval(intervalo);
  }
});

document.getElementById('btnReset').addEventListener('click', () => {
  clearInterval(intervalo);
  rodando = false;
  tempo = 25 * 60;
  btnIniciar.textContent = 'Iniciar';
  status.textContent = 'Foco total';
  document.body.style.background = '#ff6b6b';
  atualizarDisplay();
});

atualizarDisplay();
</script>
</body>
</html>
